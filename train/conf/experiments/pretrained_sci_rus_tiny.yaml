# @package _global_

defaults:
  - /base_config
  - override /text_proc/tokenizer: transformers_auto
  - override /model/embed: null
  - override /model/sent: null
  - override /model/fragment: null
  - override /model/doc: transformers_auto
  - _self_

text_proc:
  tokenizer:
    auto_tokenizer_max_seq_len: 2048


model:
  doc:
    transformers_auto_name: mlsa-iai-msu-lab/sci-rus-tiny
    transformers_fix_pretrained_params: true
    transformers_pooler: mean
