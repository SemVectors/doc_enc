# @package _global_
defaults:
  - /base_config
  - override /doc_matching: quick
  - override /doc_retrieval: quick
  - override /sent_retrieval: quick
  - _self_

cache_embeddings: true
model_id: none
eval_doc_retrieval: true
eval_doc_matching: false
eval_sent_retrieval: true
bench_sent_encoding: false


doc_encoder:
  enable_amp: true
  model_path: none
  use_gpu: 0
  max_sents: 2048
  max_tokens: 48000
  attn_impl: sdpa

  async_batch_gen: 4
  # overrides:
  #   frag:
  #     input_type: JAGGED
  #   doc:
  #     input_type: JAGGED
  #   text_proc:
  #     max_seq_len: 2048


doc_matching:
  ds_base_dir: /home/dvzubarev/Workspace/projects/semvectors/datasets-data/doc

doc_retrieval:
  sim_kind: COS
  ds_base_dir: /home/dvzubarev/Workspace/projects/semvectors/datasets-data/doc
  # query_instruction: |-
  #   Instruct: Given a web search query, retrieve relevant passages that answer the query
  #   Query:


sent_retrieval:
  ds_base_dir: /home/dvzubarev/Workspace/projects/semvectors/datasets-data/sent
  # query_instruction: |+
  #   Retrieve parallel sentences.
bench:
  sent_ds_base_dir: >-
    /home/dvzubarev/Workspace/projects/semvectors/datasets-data/sent
  doc_ds_base_dir: >-
    /home/dvzubarev/Workspace/projects/semvectors/datasets-data/doc
