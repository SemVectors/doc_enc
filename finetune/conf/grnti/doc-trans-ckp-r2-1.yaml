# @package _global_
defaults:
  - /base_classif_config
  - _self_

model_path: >-
  /train/init_models/doc_trans_full1-9-4.pt
train_meta_path: >-
    /train/data/grnti_classif/metas/meta_lvl2-2000-3000-6039/train.csv
dev_meta_path: >-
    /train/data/grnti_classif/metas/meta_lvl2-2000-3000-6039/dev.csv
test_meta_path: >-
    /train/data/grnti_classif/metas/meta_lvl2-2000-3000-6039/test.csv
data_dir: >-
    /train/data/grnti_classif/data_ru.segmented
use_gpu: 0


max_updates: 16000
eval_every: 1000

async_batch_gen: 20
max_sents: 164000
max_tokens: 470_000
bucket_multiplier: 3
enable_amp: true

lr: 0.0001
classif_module:
  dropout: 0.4

truncate_long_docs: true

validation_metric: macro_F1
