# @package _global_
defaults:
  - /base_classif_config
  - _self_

model_path: >-
    /mnt/data/apps/grnti-classification/models/pretrained/berta.pt
train_meta_path: >-
    /mnt/data/apps/grnti-classification/metas/meta_lvl1-2000-3000/train.csv
dev_meta_path: >-
    /mnt/data/apps/grnti-classification/metas/meta_lvl1-2000-3000/dev.csv
test_meta_path: >-
    /mnt/data/apps/grnti-classification/metas/meta_lvl1-2000-3000/test.csv
data_dir: >-
    /mnt/data/apps/grnti-classification/data_ru.segmented
use_gpu: 0
enable_amp: true

async_batch_gen: 8

lr: 0.0001
classif_module:
  dropout: 0.4


eval_every: 1000
max_updates: 10000

max_sents: 512
max_tokens: 48_000
bucket_multiplier: 1

truncate_long_docs: true

